name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: |
          cat > src/config.js << 'EOF'
          export const CLIENT_ID = "${{ secrets.CLIENT_ID }}"
          export const SPREADSHEET_ID = "${{ secrets.SPREADSHEET_ID }}"
          export const SCOPES = ["https://www.googleapis.com/auth/spreadsheets"]
          export const BOOKS_API_KEY = "${{ secrets.BOOKS_API_KEY }}"
          EOF
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
